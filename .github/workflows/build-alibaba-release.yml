name: Build Alibaba Cloud deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: alibaba-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      NEXT_OUTPUT_MODE: server
      NEXT_PUBLIC_GITHUB_OWNER: ${{ github.repository_owner }}
      NEXT_PUBLIC_GITHUB_REPO: ${{ github.event.repository.name }}
      NEXT_PUBLIC_GITHUB_BRANCH: main
      NEXT_PUBLIC_GITHUB_APP_ID: ${{ vars.NEXT_PUBLIC_GITHUB_APP_ID }}
      NEXT_PUBLIC_SITE_URL: http://8.140.250.236:3001

    steps:
      - name: Check deployment configuration
        run: |
          if [ -z "$NEXT_PUBLIC_GITHUB_APP_ID" ]; then
            echo "::error::Repository variable NEXT_PUBLIC_GITHUB_APP_ID is not configured."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.34.5 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Prepare deployment branch
        shell: bash
        run: |
          set -euo pipefail
          stage="$RUNNER_TEMP/blog-2025"
          mkdir -p "$stage"
          cp -a .next "$stage/.next"
          rm -rf "$stage/.next/cache" "$stage/.next/standalone"
          cp -a public "$stage/public"
          cp package.json next.config.ts "$stage/"

      - name: Publish deployment branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/blog-2025"
          git init --initial-branch=alibaba-build
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --force .next public package.json next.config.ts
          git commit -m "Deploy ${GITHUB_SHA}"
          gh auth setup-git
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin HEAD:refs/heads/alibaba-build
