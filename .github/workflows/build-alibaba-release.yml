name: Build Alibaba Cloud release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: alibaba-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      NEXT_PUBLIC_GITHUB_OWNER: ${{ github.repository_owner }}
      NEXT_PUBLIC_GITHUB_REPO: ${{ github.event.repository.name }}
      NEXT_PUBLIC_GITHUB_BRANCH: main
      NEXT_PUBLIC_GITHUB_APP_ID: ${{ vars.NEXT_PUBLIC_GITHUB_APP_ID }}
      NEXT_PUBLIC_SITE_URL: http://8.140.250.236:3001

    steps:
      - name: Check deployment configuration
        run: |
          if [ -z "$NEXT_PUBLIC_GITHUB_APP_ID" ]; then
            echo "::error::Repository variable NEXT_PUBLIC_GITHUB_APP_ID is not configured."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.34.5 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package standalone server
        shell: bash
        run: |
          set -euo pipefail
          stage="$RUNNER_TEMP/blog-2025"
          mkdir -p "$stage/.next"
          cp -a .next/standalone/. "$stage/"
          cp -a .next/static "$stage/.next/static"
          cp -a public "$stage/public"
          tar -C "$stage" -czf "$RUNNER_TEMP/blog-2025.tar.gz" .

      - name: Publish deployment release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="deploy-${GITHUB_SHA::12}"
          gh release delete "$tag" --cleanup-tag --yes 2>/dev/null || true
          gh release create "$tag" "$RUNNER_TEMP/blog-2025.tar.gz#Alibaba Cloud standalone build" \
            --target "$GITHUB_SHA" \
            --title "Alibaba deployment ${GITHUB_SHA::7}" \
            --notes "Automated standalone build for Alibaba Cloud ECS." \
            --latest

          gh release list --limit 100 --json tagName,publishedAt \
            --jq 'sort_by(.publishedAt) | reverse | map(select(.tagName | startswith("deploy-"))) | .[5:] | .[].tagName' |
          while IFS= read -r old_tag; do
            [ -n "$old_tag" ] && gh release delete "$old_tag" --cleanup-tag --yes
          done
